<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting — AD-Deen ul-Qayyim</title>
  <script>
    const hash = window.location.hash;
    let target = 'index.html';
    if (hash) {
      const section = hash.substring(1);
      if (section === 'inheritance') {
        target = 'mirath.html';
      } else if (['history', 'zakat', 'qurbani', 'calendar', 'orrery', 'market', 'pillars', 'asmaul-husna'].includes(section)) {
        target = `${section}.html`;
      }
    }
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting to the new dedicated section page... If you are not redirected, <a id="fallback-link" href="index.html">click here</a>.</p>
</body>
</html>
